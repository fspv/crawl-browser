name: Monthly Docker Build Check

on:
  schedule:
    # Run at 00:00 UTC on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch:  # Allow manual triggering for testing

env:
  DOCKER_BUILDKIT: 1

jobs:
  docker-build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        id: docker-build
        run: |
          echo "Starting Docker build..."
          docker build -t crawl-browser:monthly-check .
          echo "Docker build completed successfully"

      - name: Verify image built successfully
        run: |
          echo "Verifying Docker image..."
          docker images crawl-browser:monthly-check

          # Test if the image can run basic commands
          echo "Testing Chrome version in container..."
          docker run --rm --entrypoint chrome-for-testing crawl-browser:monthly-check --version

          # Get image size for reporting
          IMAGE_SIZE=$(docker images crawl-browser:monthly-check --format "{{.Size}}")
          echo "Image size: $IMAGE_SIZE"

      - name: Clean up
        if: always()
        run: |
          docker rmi crawl-browser:monthly-check 2>/dev/null || true
          docker system prune -f

      - name: Report build failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Monthly Docker Build Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `## Docker Build Failure Report

            The monthly Docker build check has failed.

            **Workflow Run:** [View Details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            **Date:** ${new Date().toISOString()}
            **Commit:** ${context.sha}

            Please investigate and fix the build issues.

            ### Action Items
            - [ ] Review the workflow logs
            - [ ] Fix the Dockerfile or dependencies
            - [ ] Re-run the workflow to verify the fix

            cc: @${context.repo.owner}`,
              labels: ['bug', 'docker', 'ci/cd']
            };

            await github.rest.issues.create(issue);